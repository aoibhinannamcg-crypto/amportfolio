<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aoibhin McGarry Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #root {
            width: 100%;
            height: 100%;
            background: #f5f2eb; /* Premium warm sand background */
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        section {
            padding: 90px 24px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1, h2, h3, .nav-logo, .metric-number, .testimonial-text {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.15;
            margin-bottom: 24px;
        }
        
        h2 {
            font-size: 1.4rem;
            margin-bottom: 48px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
            color: #1a1a1a;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: #f5f2eb;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.35rem;
            text-decoration: none;
            color: #1a1a1a;
            letter-spacing: 0.08em;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }
        
        /* Metrics Intro Block Layout */
        .intro-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 100px 24px;
        }

        .intro-left h1 {
            font-size: 3.8rem;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .intro-left .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #6e6b64;
            font-weight: 600;
        }

        .intro-right {
            display: flex;
            flex-direction: column;
            gap: 32px;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
            padding-left: 60px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
        }

        .metric-number {
            font-size: 3.5rem;
            line-height: 1;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #6e6b64;
            font-weight: 500;
        }
        
        /* Video Showcase Carousel Section Styling */
        .videos-section {
            background: #ece9df;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
        }
        
        .carousel-container {
            position: relative;
            padding: 0 50px;
        }
        
        .carousel {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding: 20px 0 40px 0;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .carousel::-webkit-scrollbar {
            height: 4px;
        }
        
        .carousel::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 2px;
        }
        
        .video-card {
            flex-shrink: 0;
            width: 280px;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #111;
            border-radius: 14px; /* Premium TikTok card edge */
            border: 1px solid rgba(0, 0, 0, 0.1);
            scroll-snap-align: center;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .video-card:hover, .video-card.auto-playing {
            transform: scale(1.03) translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(90%);
            transition: transform 4s linear, filter 0.3s ease;
        }

        .video-card:hover img, .video-card.auto-playing img {
            transform: scale(1.12);
            filter: brightness(75%);
        }
        
        /* Clean Overlay showing ONLY the views metrics */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .video-stats {
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }

        .video-card:hover .video-stats, .video-card.auto-playing .video-stats {
            transform: scale(1.1);
            background: #1a1a1a;
        }
        
        .view-count {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #f5f2eb;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            width: 54px;
            height: 54px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

            background: #1a1
