<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aoibhin McGarry Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #root {
            width: 100%;
            height: 100%;
            background: #f5f2eb; /* Professional warm sand background */
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        section {
            padding: 90px 24px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1, h2, .nav-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.15;
            margin-bottom: 24px;
        }
        
        h2 {
            font-size: 1.5rem;
            margin-bottom: 48px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
            color: #1a1a1a;
        }

        /* Minimal Header Inspired by Pinterest Boards */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: #f5f2eb;
        }

        .nav-logo {
            font-size: 1.35rem;
            text-decoration: none;
            color: #1a1a1a;
            letter-spacing: 0.08em;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }
        
        /* Hero Section Styling */
        .hero {
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f5f2eb;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .hero-content {
            max-width: 750px;
        }
        
        .hero-subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #6e6b64;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .hero-description {
            font-size: 1.1rem;
            color: #4a4945;
            max-width: 580px;
            margin: 0 auto;
            font-weight: 300;
            line-height: 1.7;
        }
        
        /* Video Carousel Section */
        .videos-section {
            background: #eded text-shadow;
            background: #ece9df; /* Subtle dark tone contrast for the showcase */
        }
        
        .carousel-container {
            position: relative;
        }
        
        .carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 24px;
            scroll-behavior: smooth;
        }
        
        .carousel::-webkit-scrollbar {
            height: 2px;
        }
        
        .carousel::-webkit-scrollbar-thumb {
            background: #1a1a1a;
        }
        
        .video-card {
            flex-shrink: 0;
            width: 270px;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #1a1a1a;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .video-card:hover {
            transform: translateY(-4px);
        }
        
        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(10%) brightness(95%);
            transition: filter 0.3s ease;
        }

        .video-card:hover img {
            filter: grayscale(0%) brightness(90%);
        }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            flex-direction: column;
            padding: 20px;
        }
        
        .video-stats {
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        
        .view-count {
            font-size: 0.95rem;
            font-weight: 400;
        }
        
        .video-description {
            color: #e5e5e5;
            font-size: 0.85rem;
            font-weight: 300;
        }
        
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #f5f2eb;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s ease;
        }
        
        .carousel-button:hover {
            background: #1a1a1a;
        }

        .carousel-button:hover .carousel-button-icon {
            color: #f5f2eb;
        }
        
        .carousel-button-left { left: -22px; }
        .carousel-button-right { right: -22px; }
        
        .carousel-button-icon {
            width: 16px;
            height: 16px;
            color: #1a1a1a;
        }

        /* Mobile Layout Modifications */
        .mobile-carousel {
            position: relative;
            height: 75vh;
            background: #1a1a1a;
            overflow: hidden;
        }
        
        .mobile-carousel-inner {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .mobile-carousel-inner::-webkit-scrollbar {
            display: none;
        }
        
        .mobile-video-item {
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
        }
        
        .mobile-video-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.5;
            pointer-events: none;
        }
        
        footer {
            padding: 60px 24px;
            background: #f5f2eb;
            text-align: center;
            color: #6e6b64;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        @media (max-width: 767px) {
            h1 { font-size: 2.5rem; }
            section { padding: 50px 24px; }
            .nav-links, .carousel-button, .carousel { display: none; }
            .mobile-carousel { display: block; }
        }
        
        @media (min-width: 768px) {
            .mobile-carousel { display: none; }
        }
    </style>
</head>
<body>

    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function Portfolio() {
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            
            const tiktokVideos = [
                {
                    id: 1,
                    videoUrl: 'https://www.tiktok.com/@dashburgerdublin/video/7175089190856559878',
                    coverImage: 'https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=600',
                    views: '26M',
                    description: 'Dash Burger',
                },
                {
                    id: 2,
                    videoUrl: 'https://www.tiktok.com/@jackiesdublin/video/7212962776996793606',
                    coverImage: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=600',
                    views: '9.4M',
                    description: 'Jackies Dublin',
                },
                {
                    id: 3,
                    videoUrl: 'https://www.tiktok.com/@jackiesdublin/video/7096461898694020358',
                    coverImage: 'https://images.unsplash.com/photo-1536935338788-846bb9981813?q=80&w=600',
                    views: '11.5M',
                    description: 'Jackies Cocktail Experience',
                },
                {
                    id: 4,
                    videoUrl: 'https://www.tiktok.com/@jackiesdublin/video/7188163828243385605',
                    coverImage: 'https://images.unsplash.com/photo-1572116469696-31de0f17cc34?q=80&w=600',
                    views: '13.4M',
                    description: 'Jackies Retro Interior',
                },
                {
                    id: 5,
                    videoUrl: 'https://www.tiktok.com/@dashburgerdublin/video/7246412323764636954',
                    coverImage: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=600',
                    views: '14.3M',
                    description: 'Smashed Beef Details',
                }
            ];
            
            const scrollCarousel = (direction) => {
                const carousel = document.getElementById('carousel');
                if (carousel) {
                    carousel.scrollBy({ left: direction === 'left' ? -290 : 290, behavior: 'smooth' });
                }
            };
            
            return (
                <div>
                    {/* Navigation Header */}
                    <nav className="nav-header">
                        <a href="#" className="nav-logo">AOIBHIN M.</a>
                        <div className="nav-links">
                            <a href="#work">Featured Work</a>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="hero">
                        <div className="hero-content">
                            <p className="hero-subtitle">Content Creator & Visual Storyteller</p>
                            <h1>Aoibhin McGarry</h1>
                            <p className="hero-description">
                                Building refined creative narratives through high-impact social video. 
                                Fusing clean aesthetics with compelling visual storytelling that drives engagement.
                            </p>
                        </div>
                    </section>
                    
                    {/* Videos Showcase Section */}
                    <section id="work" className="videos-section">
                        <div className="container">
                            <h2>Featured Work</h2>
                            
                            {isMobile ? (
                                <div className="mobile-carousel">
                                    <div className="mobile-carousel-inner">
                                        {tiktokVideos.map((video) => (
                                            <div
                                                key={video.id}
                                                className="mobile-video-item"
                                                onClick={() => window.open(video.videoUrl, '_blank')}
                                            >
                                                <img src={video.coverImage} alt={video.description} />
                                                <div className="video-overlay">
                                                    <div className="video-stats">
                                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width: '18px', height: '18px'}}>
                                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                            <circle cx="12" cy="12" r="3"></circle>
                                                        </svg>
                                                        <span className="view-count">{video.views}</span>
                                                    </div>
                                                    <p className="video-description">{video.description}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="scroll-hint">Swipe to see more</div>
                                </div>
                            ) : (
                                <div className="carousel-container">
                                    <div className="carousel" id="carousel">
                                        {tiktokVideos.map((video) => (
                                            <div
                                                key={video.id}
                                                className="video-card"
                                                onClick={() => window.open(video.videoUrl, '_blank')}
                                            >
                                                <img src={video.coverImage} alt={video.description} />
                                                <div className="video-overlay">
                                                    <div className="video-stats">
                                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width: '16px', height: '16px'}}>
                                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                            <circle cx="12" cy="12" r="3"></circle>
                                                        </svg>
                                                        <span className="view-count">{video.views}</span>
                                                    </div>
                                                    <p className="video-description">{video.description}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button className="carousel-button carousel-button-left" onClick={() => scrollCarousel('left')} aria-label="Previous">
                                        <svg className="carousel-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <polyline points="15 18 9 12 15 6"></polyline>
                                        </svg>
                                    </button>
                                    <button className="carousel-button carousel-button-right" onClick={() => scrollCarousel('right')} aria-label="Next">
                                        <svg className="carousel-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <polyline points="9 18 15 12 9 6"></polyline>
                                        </svg>
                                    </button>
                                </div>
                            )}
                        </div>
                    </section>
                    
                    {/* Minimalist Footer */}
                    <footer>
                        <p>© 2026 Aoibhin McGarry. All rights reserved.</p>
                    </footer>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
