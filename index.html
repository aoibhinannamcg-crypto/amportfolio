<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #root {
            width: 100%;
            height: 100%;
            background: #000000; /* Reverted back to your signature deep black theme */
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Top Minimalist Header Navigation */
        .nav-header {
            display: flex;
            justify-content: flex-end;
            padding: 24px 40px;
            background: transparent;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #ffffff;
        }
        
        /* Hero Tagline Block */
        .hero-section {
            text-align: center;
            padding: 60px 0 40px 0;
        }

        .hero-tagline {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.3;
        }
        
        /* High Impact Stats Banner Row */
        .stats-banner {
            background: linear-gradient(180deg, rgba(15,15,15,0.5) 0%, rgba(5,5,5,0.8) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 0;
            text-align: center;
            margin-bottom: 60px;
        }

        .main-stat-box {
            margin-bottom: 40px;
        }

        .main-stat-number {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #ffffff;
        }

        .main-stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        .sub-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            max-width: 900px;
            margin: 0 auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 40px;
        }

        .sub-stat-item {
            position: relative;
        }

        .sub-stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .sub-stat-number {
            font-size: 2.2rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.2;
        }

        .sub-stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }
        
        /* Updated Video Carousel Container Markup */
        .carousel-section {
            padding: 20px 0 80px 0;
        }
        
        .carousel-container {
            position: relative;
            padding: 0 50px;
        }
        
        .carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .carousel::-webkit-scrollbar {
            height: 3px;
        }
        
        .carousel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }
        
        .video-card {
            flex-shrink: 0;
            width: 240px;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            background: #111111;
            border-radius: 12px; /* Authentic rounded edges from design */
            scroll-snap-align: center;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .video-card:hover, .video-card.auto-playing {
            transform: scale(1.04);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
        }
        
        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(85%);
            transition: transform 3s ease, filter 0.3s ease;
        }

        .video-card:hover img, .video-card.auto-playing img {
            transform: scale(1.08);
            filter: brightness(70%);
        }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .video-stats {
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        
        .view-count {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s ease;
        }
        
        .carousel-button:hover {
            background: #ffffff;
        }

        .carousel-button:hover .carousel-button-icon {
            color: #000000;
        }
        
        .carousel-button-left { left: 0px; }
        .carousel-button-right { right: 0px; }
        
        .carousel-button-icon {
            width: 18px;
            height: 18px;
            color: #ffffff;
        }

        /* Testimonial Block Layout styling matching image text layout */
        .testimonial-section {
            padding: 100px 0;
            background: #000000;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .testimonial-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .testimonial-text {
            font-size: 1.15rem;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            margin-bottom: 32px;
            text-align: center;
        }

        .testimonial-author {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #ffffff;
            font-weight: 500;
            font-style: italic;
        }

        /* Monochromatic Infinite Partner Grid logo strip styling */
        .brand-logos-section {
            padding: 40px 0 80px 0;
            background: #000000;
            text-align: center;
        }

        .brand-logos-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            opacity: 0.4; /* Styled to replicate the muted clean look */
            filter: brightness(0) invert(1);
            max-width: 1000px;
            margin: 0 auto;
        }

        .mock-logo-node {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 10px;
        }

        /* High-End Soft Minimalist Footer Block */
        .footer-contact {
            background: #e8e5dd; /* Exact warm sand tone from bottom of original site design */
            color: #000000;
            padding: 100px 0;
        }

        .footer-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .footer-title {
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .footer-links-box {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
        }

        .footer-links-box a {
            color: #000000;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            transition: opacity 0.2s ease;
        }

        .footer-links-box a:hover {
            opacity: 0.6;
        }
        
        @media (max-width: 768px) {
            .hero-tagline { font-size: 1.3rem; }
            .main-stat-number { font-size: 3.5rem; }
            .sub-stats-grid { grid-template-columns: 1fr; gap: 30px; }
            .sub-stat-item::after { display: none; }
            .carousel-button { display: none; }
            .carousel-container { padding: 0; }
            .testimonial-text { font-size: 1rem; }
            .footer-grid { flex-direction: column; gap: 40px; }
            .footer-links-box { text-align: left; }
        }
    </style>
</head>
